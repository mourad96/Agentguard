agent:
  name: "AgentGuard"
  verification_interval: 10 # Check every 10 transitions

# Define state names for reference and readability, though unseen states will be added dynamically.
states:
  - "Init"
  - "Analyzing"
  - "Fixing"
  - "Fix_Success"
  - "Fix_Failed"
  - "Error"

# Define the properties to verify
properties:
  # Expected minimum cycles/reward to finish (cost)
  # R{"cycles"}min=? [ F "Fix_Success" ] represents expected minimum reward "cycles".
  # Wait, standard expected reward in PRISM syntax is R{"cycles"}min=? [ F "Fix_Success" ]
  min_expected_cycles: "Rmin=?[ F \"Fix_Success\" ]"

  # Max probability of successfully reaching the "Fix_Success" state
  max_prob_success: "Pmax=? [ F \"Fix_Success\" ]"

  # Max probability of NOT invoking write_fix globally
  prob_missing_critical_action: "Pmax=? [ G !\"write_fix\" ]"

# Actions the agent can perform
actions:
  - "read_file"
  - "run_tests"
  - "write_fix"
  - "finalize"

safety_thresholds:
  min_prob_success: 0.8
  max_expected_cycles: 50.0
  max_prob_missing_critical: 0.1
