agent:
  name: "AgentGuard"
  verification_interval: 10 # Check every 10 transitions

# Define state names for reference and readability, though unseen states will be added dynamically.
states:
  - "Opportunity_Spotted"
  - "TX_Construction"
  - "TX_Confirmed"
  - "On_Chain_Revert"
  - "Network_Error"

# Define the properties to verify
properties:
  # Expected minimum cycles/reward to finish (cost)
  # R{"cycles"}min=? [ F "TX_Confirmed" ] represents expected minimum reward "cycles".
  # Wait, standard expected reward in PRISM syntax is R{"cycles"}min=? [ F "TX_Confirmed" ]
  min_expected_cycles: "Rmin=?[ F \"TX_Confirmed\" ]"

  # Max probability of successfully reaching the "TX_Confirmed" state
  max_prob_success: "Pmax=? [ F \"TX_Confirmed\" ]"

  # Max probability of NOT invoking submit_tx globally
  prob_missing_critical_action: "Pmax=? [ G !\"submit_tx\" ]"

# Actions the agent can perform
actions:
  - "fetch_data"
  - "submit_tx"
  - "finalize"

safety_thresholds:
  min_prob_success: 0.8
  max_expected_cycles: 50.0
  max_prob_missing_critical: 0.1
