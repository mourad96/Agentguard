agent:
  name: "LiquidationBot"
  verification_interval: 5  # Check every 5 transitions (aggressive for high-stakes)

states:
  - "Opportunity_Spotted"  # S5
  - "TX_Construction"      # S0
  - "Network_Error"        # S1
  - "On_Chain_Revert"      # S2
  - "TX_Confirmed"         # S3

properties:
  min_expected_cycles: "Rmin=?[ F \"TX_Confirmed\" ]" # Maps to Expected Gas
  max_prob_success: "Pmax=? [ F \"TX_Confirmed\" ]"
  prob_stuck_in_revert: "Pmax=? [ G !\"TX_Confirmed\" ]"

actions:
  - "fetch_data"
  - "submit_tx"
  - "adjust_params"

safety_thresholds:
  min_prob_success: 0.20        # Kill if P(success) < 20%
  max_expected_cycles: 10.0     # Kill if expected cost > 10 gas units
  max_prob_missing_critical: 0.8  # Kill if P(never confirming) > 80%
