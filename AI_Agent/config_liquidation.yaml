agent:
  name: "HederaLiquidationBot"
  verification_interval: 3

seed_from_previous: false
seed_weight: 5
prism_output: "../Runtime_verification/latest_model.prism"

states:
  - "Opportunity_Spotted"
  - "TX_Construction"
  - "TX_Confirmed"
  - "On_Chain_Revert"
  - "Network_Error"

properties:
  min_expected_cycles: "Rmin=?[ F \"TX_Confirmed\" ]"
  max_prob_success: "Pmax=? [ F \"TX_Confirmed\" ]"
  prob_missing_critical_action: "Pmax=? [ G !\"TX_Confirmed\" ]"

actions:
  - "fetch_data"
  - "submit_tx"
  - "finalize"
  - "adjust_params"

safety_thresholds:
  min_prob_success: 0.80
  max_expected_cycles: 10.0
  max_prob_missing_critical: 0.5
